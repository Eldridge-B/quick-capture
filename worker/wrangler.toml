name = "quick-capture-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Secrets — set via `wrangler secret put`, never commit real values:
#   NOTION_API_KEY     — Notion internal integration token
#   DEEPGRAM_API_KEY   — Deepgram API key (Nova-2 model)
#   CAPTURE_SECRET     — Shared secret for app ↔ worker auth
#   ANTHROPIC_API_KEY  — Anthropic API key (for Lookup research)

[[r2_buckets]]
binding = "IMAGE_BUCKET"
bucket_name = "quick-capture-images"

[[r2_buckets]]
binding = "AUDIO_BUCKET"
bucket_name = "quick-capture-audio"
